[project]
name = "zinc-flow-csharp"
version = "0.1.0"
main = "ZincFlow/Program.cs"

[csharp]
framework = "net10.0"
lang_version = "latest"
nullable = true
implicit_usings = true
unsafe = true

[csharp.aot]
enabled = true
strip_symbols = true
invariant_globalization = true
optimization = "Size"
stack_traces = false
trim_metadata = true

[csharp.gc]
server = true

[csharp.nuget]
# No NuGet deps yet — pure BCL
# Example:
# packages = [
#   { name = "System.IO.Pipelines", version = "10.0.0" },
# ]

server:
  port: 9091

logging:
  level: DEBUG
  format: text

content:
  dir: /tmp/zinc-flow-csharp/content
  offload_threshold_kb: 256       # FlowFiles larger than this → disk claim
  sweep_interval_ms: 300000       # orphan cleanup every 5 min

defaults:
  backpressure:
    max_count: 10000
    max_retries: 5
    drain_timeout: 60

sources:
  listen_http:
    port: 9092
    path: /

flow:
  processors:
    tag-env:
      type: UpdateAttribute
      config:
        key: env
        value: dev

    tag-source:
      type: UpdateAttribute
      config:
        key: source
        value: api

    logger:
      type: LogAttribute
      config:
        prefix: flow

    sink:
      type: PutFile
      requires:
        - content
      config:
        output_dir: /tmp/zinc-flow-csharp/output
        naming_attribute: filename

  routes:
    tag-all:
      condition:
        attribute: type
        operator: EXISTS
      destination: tag-env

    after-tag-env:
      condition:
        attribute: env
        operator: EQ
        value: dev
      destination: tag-source

    after-tag-source:
      condition:
        attribute: source
        operator: EXISTS
      destination: logger

    after-log:
      condition:
        attribute: source
        operator: EXISTS
      destination: sink

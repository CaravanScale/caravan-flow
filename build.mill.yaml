# zinc-flow — Zinc Flow project (Mill build)
# Docs: https://mill-build.org/mill/index.html
#
# Commands (via zinc CLI or Mill directly):
#   zinc build src/            compile (transpile + mill compile)
#   zinc run src/main.zn       run (transpile + mill run)
#   zinc build --native src/   GraalVM native binary (mill nativeImage)

extends: JavaModule
jvmVersion: 25

javacOptions:
  - --enable-preview
  - --release
  - "25"

forkArgs:
  - --enable-preview

mainClass: flow.Main

# Maven Central dependencies
mvnDeps:
  - io.micronaut:micronaut-http-server-netty:4.7.6
  - io.micronaut:micronaut-runtime:4.7.6
  - io.micronaut.serde:micronaut-serde-jackson:2.12.0
  - ch.qos.logback:logback-classic:1.5.6

annotationProcessorsMvnDeps:
  - io.micronaut:micronaut-inject-java:4.7.6
  - io.micronaut:micronaut-http-validation:4.7.6
  - io.micronaut.serde:micronaut-serde-processor:2.12.0

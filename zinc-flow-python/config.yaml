server:
  port: 9091
  host: 0.0.0.0

logging:
  level: DEBUG

content:
  dir: /tmp/zinc-flow-python/content

defaults:
  backpressure:
    max_count: 10000
    max_retries: 5
    drain_timeout: 60

flow:
  processors:
    tag-env:
      type: add-attribute
      config:
        key: env
        value: dev

    tag-source:
      type: add-attribute
      config:
        key: source
        value: api

    logger:
      type: log
      config:
        prefix: flow

    sink:
      type: file-sink
      requires:
        - content
      config:
        output_dir: /tmp/zinc-flow-python/output

  routes:
    tag-all:
      condition:
        attribute: type
        operator: EXISTS
      destination: tag-env

    after-tag-env:
      condition:
        attribute: env
        operator: EQ
        value: dev
      destination: tag-source

    after-tag-source:
      condition:
        attribute: source
        operator: EXISTS
      destination: logger

    after-log:
      condition:
        attribute: source
        operator: EXISTS
      destination: sink

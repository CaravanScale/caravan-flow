name: zinc_flow
version: 0.1.0

authors:
  - Vinit Joshi <vinit812010@gmail.com>

description: |
  Prototype Crystal port of zinc-flow worker — evaluating Crystal's
  macros + concurrency for a NiFi-style processor fabric.

targets:
  zinc_flow:
    main: src/zinc_flow.cr

dependencies:
  # Local sibling shards — crystal-avro and crystal-jsonpath live next
  # to us in the monorepo. `shards install` creates lib/* symlinks. For
  # the portable container build the Dockerfile copies all three dirs
  # into /src.
  avro:
    path: "../crystal-avro"
  jsonpath:
    path: "../crystal-jsonpath"

crystal: ">= 1.20.0"

license: MIT

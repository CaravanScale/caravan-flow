# 04 — Schema evolution with an inline reader schema
#
# Producer wrote .avro with v1 schema:  {id: long, name: string, age: int}
# Consumer wants v2:  {id: long, name: string, age: long, email: string with default}
#
# Evolution applied automatically:
#   - age: int → long (allowed promotion)
#   - email: missing in writer → reader default "unknown@example.com"
#   - any writer-only fields would be silently dropped on read
#
# Incompatible reader schemas (e.g., requiring a non-default field that
# doesn't exist in the writer) cause the OCF read to fail loudly.
#
# Try it:
#   ./build/CaravanFlow validate examples/04-schema-evolution.yaml

server:
  port: 9091

content:
  dir: /tmp/caravan-flow-csharp/content

sources:
  fileIngest:
    type: GetFile
    config:
      inputDir: /tmp/avro-v1-in
      pattern: "*.avro"

flow:
  processors:

    parse-evolved:
      type: ConvertOCFToRecord
      requires: [content]
      config:
        # Inline JSON schema. The Avro JSON spec allows a field's "type" to be
        # an object with logicalType + precision/scale (for timestamps,
        # decimals, etc.) — they're preserved through the OCF roundtrip.
        readerSchema: |
          {
            "type": "record",
            "name": "User",
            "fields": [
              {"name": "id", "type": "long"},
              {"name": "name", "type": "string"},
              {"name": "age", "type": "long"},
              {"name": "email", "type": "string"}
            ]
          }
      connections:
        success: [encode]
        failure: [errors]

    encode:
      type: ConvertRecordToOCF
      config:
        codec: deflate
      connections:
        success: [write]

    write:
      type: PutFile
      requires: [content]
      config:
        outputDir: /tmp/avro-v2-out
        namingAttribute: filename
        suffix: .v2.avro

    errors:
      type: LogAttribute
      config:
        prefix: evolve-error

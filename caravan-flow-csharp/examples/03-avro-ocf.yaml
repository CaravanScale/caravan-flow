# 03 — Read real .avro files from disk
#
# Watches /tmp/avro-in for .avro files (Avro Object Container Files — the
# format Kafka Connect, Spark, and avro-tools produce). Decodes with the
# embedded schema, transforms, writes back as zstandard-compressed OCF.
#
# Try it:
#   ./build/CaravanFlow validate examples/03-avro-ocf.yaml
#   mkdir -p /tmp/avro-in /tmp/avro-out
#   cp examples/03-avro-ocf.yaml config.yaml && ./build/CaravanFlow
#   # Drop a .avro file into /tmp/avro-in/ — it'll be processed and moved
#   # to /tmp/avro-in/.processed/, output lands in /tmp/avro-out/.

server:
  port: 9091

content:
  dir: /tmp/caravan-flow-csharp/content

sources:
  fileIngest:
    type: GetFile
    config:
      inputDir: /tmp/avro-in
      pattern: "*.avro"
      pollIntervalMs: 1000

flow:
  entryPoints: [parse]

  processors:
    # OCF reader. With no readerSchema config, decodes using the writer
    # schema from the file header — supports null, deflate, zstandard codecs.
    parse:
      type: ConvertOCFToRecord
      requires: [content]

    # Add a derived field. Original field types are preserved.
    transform:
      type: TransformRecord
      config:
        operations: >
          compute:processed_at:long(1234567890);
          compute:summary:concat("rec-", string(id))

    # Write back as OCF with zstandard compression (most space-efficient codec).
    # Supported codecs: null, deflate, zstandard.
    encode:
      type: ConvertRecordToOCF
      config:
        codec: zstandard

    write:
      type: PutFile
      requires: [content]
      config:
        outputDir: /tmp/avro-out
        namingAttribute: filename
        suffix: .processed.avro

    errors:
      type: LogAttribute
      config:
        prefix: avro-error

  connections:
    parse:
      success: [transform]
      failure: [errors]
    transform:
      success: [encode]
    encode:
      success: [write]

server:
  port: 9091
  host: 0.0.0.0

logging:
  level: DEBUG
  handler: text
  output: stdout

content:
  threshold: 262144
  dir: /tmp/zinc-flow/content

# Flow graph: defines active processor instances and routing rules
flow:
  processors:
    - name: tag-env
      type: add-attribute
      config:
        key: env
        value: dev

    - name: tag-source
      type: add-attribute
      config:
        key: source
        value: api

    - name: logger
      type: log
      config:
        prefix: flow

    - name: sink
      type: file-sink
      config:
        output_dir: /tmp/zinc-flow/output

  routes:
    - name: tag-all
      condition:
        attribute: type
        operator: EXISTS
      destination: tag-env

    - name: after-tag-env
      condition:
        attribute: env
        operator: EQ
        value: dev
      destination: tag-source

    - name: after-tag-source
      condition:
        attribute: source
        operator: EXISTS
      destination: logger

    - name: after-log
      condition:
        attribute: source
        operator: EXISTS
      destination: sink

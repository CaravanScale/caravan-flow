name: caravan_flow
version: 0.1.0

authors:
  - Vinit Joshi <vinit812010@gmail.com>

description: |
  Prototype Crystal port of caravan-flow worker — evaluating Crystal's
  macros + concurrency for a NiFi-style processor fabric.

targets:
  caravan_flow:
    main: src/caravan_flow.cr

dependencies:
  # Local sibling shard — crystal-avro lives next to us in the monorepo.
  # `shards install` creates lib/avro as a symlink. For the portable
  # container build the Dockerfile copies both dirs into /src.
  avro:
    path: "../crystal-avro"

crystal: ">= 1.20.0"

license: MIT
